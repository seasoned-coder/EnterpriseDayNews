services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: enterpriseday
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/enterpriseday
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - db
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "3000:80"
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - uploads:/usr/share/nginx/html/uploads:ro
      - ./frontend:/app
      - /app/node_modules

volumes:
  uploads:
