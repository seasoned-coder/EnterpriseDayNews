services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: enterpriseday
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  backend:
    # 1. Provide the GitHub Image Name
    image: ghcr.io/seasoned-coder/news-backend:latest
    # 2. Keep the build instruction for your laptop
    restart: unless-stopped
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/enterpriseday
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - db
    volumes:
      - uploads:/app/uploads

  frontend:
    # 1. Provide the GitHub Image Name
    image: ghcr.io/seasoned-coder/news-frontend:latest
    # 2. Keep the build instruction for your laptop
    restart: unless-stopped
    build:
      context: ./frontend
      target: production
    ports:
      - "3000:80"
    depends_on:
      - backend
    volumes:
      - uploads:/usr/share/nginx/html/uploads:ro

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  uploads:
  caddy_data:
  caddy_config:
