spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# PostgreSQL datasource (used in dev/prod with Docker)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/enterpriseday}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Where uploaded images are stored on disk. Override with APP_UPLOAD_DIR or -Dapp.upload-dir.
app.upload-dir=${APP_UPLOAD_DIR:./uploads}
